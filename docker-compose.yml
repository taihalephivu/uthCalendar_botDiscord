version: "3.8"

services:
  # Cloudflare WARP - Cổng kết nối bảo mật cho Bot và Worker
  uth_warp:
    image: caomingjun/warp
    container_name: uth_warp
    restart: always
    device_cgroup_rules:
      - 'c 10:200 rwm'
    cap_add:
      - MKNOD
      - AUDIT_WRITE
      - NET_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
    environment:
      - WARP_SLEEP=2
      - LOG_LEVEL=info
    volumes:
      - uth_warp_data:/var/lib/cloudflare-warp
    networks:
      - uth-network
  # Redis - Celery Broker
  uth_redis:
    image: redis:7-alpine
    container_name: uth_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - uth-network

  # Discord Bot
  uth_bot:
    build: .
    image: vanphat111/uth-calendar:latest
    container_name: uth_calendar_bot
    restart: unless-stopped
    depends_on:
      - uth_warp
    networks:
      - uth-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Ho_Chi_Minh
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - ADMIN_ID=${ADMIN_ID}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - WEATHER_API_KEY=${WEATHER_API_KEY}
      - WARP_PROXY_URL=socks5://uth_warp:1080
      - CELERY_BROKER_URL=redis://uth_redis:6379/0
      - DB_PATH=data/database.sqlite3

  # Worker VIP - Chỉ xử lý hàng ưu tiên
  worker_vip:
    build: .
    image: vanphat111/uth-calendar:latest
    hostname: VIP_Worker
    restart: unless-stopped
    command: python -m celery -A task worker -Q high_priority --concurrency=1 --loglevel=info
    deploy:
      replicas: 2
    networks:
      - uth-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    depends_on:
      - uth_redis
      - uth_warp
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - WEATHER_API_KEY=${WEATHER_API_KEY}
      - WARP_PROXY_URL=socks5://uth_warp:1080
      - CELERY_BROKER_URL=redis://uth_redis:6379/0
      - DB_PATH=data/database.sqlite3

  # Worker Low - Xử lý đa nhiệm
  worker_low:
    build: .
    image: vanphat111/uth-calendar:latest
    hostname: Low_Worker
    restart: unless-stopped
    command: python -m celery -A task worker -Q high_priority,low_priority --concurrency=1 --loglevel=info
    deploy:
      replicas: 3
    networks:
      - uth-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    depends_on:
      - uth_redis
      - uth_warp
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - WEATHER_API_KEY=${WEATHER_API_KEY}
      - WARP_PROXY_URL=socks5://uth_warp:1080
      - CELERY_BROKER_URL=redis://uth_redis:6379/0
      - DB_PATH=data/database.sqlite3

  # Celery Beat - Lập lịch định kỳ
  celery_beat:
    build: .
    image: vanphat111/uth-calendar:latest
    container_name: uth_celery_beat
    restart: unless-stopped
    command: python -m celery -A task beat --loglevel=info
    networks:
      - uth-network
    depends_on:
      - uth_redis
    volumes:
      - ./data:/app/data
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - WEATHER_API_KEY=${WEATHER_API_KEY}
      - CELERY_BROKER_URL=redis://uth_redis:6379/0
      - DB_PATH=data/database.sqlite3

  # Flower - Giám sát Celery
  flower:
    image: mher/flower:latest
    container_name: uth_flower
    restart: unless-stopped
    environment:
      - CELERY_BROKER_URL=redis://uth_redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - uth_redis
    networks:
      - uth-network

volumes:
  redis_data:
  uth_warp_data:

networks:
  uth-network:
    driver: bridge